<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎃 Skellington</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --border: #2d2d2d;
            --orange: #ff6b1a;
            --purple: #8b44ff;
            --green: #00cc66;
            --text: #e8e8e8;
            --dim: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 1.5rem; border-bottom: 1px solid var(--border); text-align: center; }
        header h1 { font-size: 2rem; color: var(--orange); }
        header p { color: var(--dim); margin-top: 0.25rem; }
        .agents { display: flex; gap: 0.5rem; justify-content: center; padding: 1rem; flex-wrap: wrap; }
        .agent-badge { padding: 0.3rem 0.8rem; border-radius: 999px; border: 1px solid var(--border); font-size: 0.8rem; color: var(--dim); }
        .main { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem; max-width: 900px; margin: 0 auto; width: 100%; }
        #output { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-y: auto; min-height: 200px; white-space: pre-wrap; line-height: 1.6; }
        .input-row { display: flex; gap: 0.75rem; }
        #request-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text); font-family: inherit; font-size: 1rem; outline: none; }
        #request-input:focus { border-color: var(--orange); }
        button { background: var(--orange); color: #000; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-family: inherit; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.85; }
        .status-line { color: var(--purple); }
        .result-line { color: var(--green); }
        .error-line { color: #ff4444; }
    </style>
</head>
<body>
    <header>
        <h1>🎃 Skellington 🎄</h1>
        <p>Multi-agent AI orchestration — Halloween meets Christmas</p>
    </header>
    <div class="agents" id="agents-list">
        <span class="agent-badge">🎃 Jack</span>
        <span class="agent-badge">🧟‍♀️ Sally</span>
        <span class="agent-badge">🎰 Oogie</span>
        <span class="agent-badge">👻 Zero</span>
        <span class="agent-badge">👹 Lock/Shock/Barrel</span>
        <span class="agent-badge">🎭 Mayor</span>
    </div>
    <div class="main">
        <div id="output">Ready. Enter a request below and Jack will orchestrate the crew.
</div>
        <div class="input-row">
            <input id="request-input" type="text" placeholder="e.g. research Python async libraries and scaffold a demo project" />
            <button onclick="sendRequest()">Run 🎃</button>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('request-input');

        function appendLine(text, cls = '') {
            const line = document.createElement('div');
            if (cls) line.className = cls;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        async function sendRequest() {
            const request = input.value.trim();
            if (!request) return;
            input.value = '';
            output.innerHTML = '';

            appendLine(`> ${request}`, 'dim');
            appendLine('');

            const ws = new WebSocket(`ws://${location.host}/ws/run`);

            ws.onopen = () => ws.send(JSON.stringify({ request }));

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'status') {
                    appendLine(data.message, 'status-line');
                } else if (data.type === 'complete') {
                    appendLine('');
                    if (data.success) {
                        appendLine('─'.repeat(60));
                        appendLine(data.result || '(no result)', 'result-line');
                    } else {
                        appendLine(`Error: ${data.result || 'workflow failed'}`, 'error-line');
                    }
                }
            };

            ws.onerror = () => appendLine('WebSocket error', 'error-line');
        }

        input.addEventListener('keydown', e => { if (e.key === 'Enter') sendRequest(); });
    </script>
</body>
</html>
